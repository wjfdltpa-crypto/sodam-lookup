<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>소담클래스 컨설팅 배정 조회</title>
<style>
  :root{
    --primary:#2b5c4f; --primary-dark:#1e4238; --accent:#e8734a;
    --bg:#f4f6f5; --card:#ffffff; --text:#22302c; --muted:#6b7c76;
    --danger:#c0392b; --line:#e2e8e5;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;
    background:var(--bg); color:var(--text); min-height:100vh;
    display:flex; flex-direction:column; align-items:center;
    -webkit-font-smoothing:antialiased;
  }
  header{
    width:100%; background:linear-gradient(135deg,var(--primary),var(--primary-dark));
    color:#fff; text-align:center; padding:44px 20px 60px;
  }
  header .badge{
    display:inline-block; font-size:12px; letter-spacing:2px; font-weight:600;
    background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.3);
    border-radius:999px; padding:5px 14px; margin-bottom:14px;
  }
  header h1{font-size:clamp(20px,4.5vw,28px); font-weight:700; line-height:1.35}
  header p{margin-top:10px; font-size:clamp(13px,3vw,15px); opacity:.85; line-height:1.6}
  main{width:100%; max-width:560px; padding:0 16px 60px; margin-top:-32px}
  .card{
    background:var(--card); border-radius:16px; padding:28px 24px;
    box-shadow:0 6px 24px rgba(30,66,56,.10);
  }
  label{display:block; font-size:14px; font-weight:600; margin-bottom:8px}
  .input-row{display:flex; gap:8px}
  input#bizno{
    flex:1; min-width:0; font-size:18px; padding:14px 16px; letter-spacing:1px;
    border:1.5px solid var(--line); border-radius:10px; outline:none;
    transition:border-color .15s;
  }
  input#bizno:focus{border-color:var(--primary)}
  button#searchBtn{
    flex-shrink:0; background:var(--primary); color:#fff; border:none; border-radius:10px;
    font-size:16px; font-weight:700; padding:0 22px; cursor:pointer;
    transition:background .15s;
  }
  button#searchBtn:hover{background:var(--primary-dark)}
  button#searchBtn:disabled{background:#9db3ac; cursor:wait}
  .hint{font-size:12.5px; color:var(--muted); margin-top:8px; line-height:1.5}
  .msg{
    display:none; margin-top:16px; padding:14px 16px; border-radius:10px;
    font-size:14px; line-height:1.6;
  }
  .msg.error{display:block; background:#fdf0ee; color:var(--danger); border:1px solid #f3cdc7}
  .msg.info{display:block; background:#eef4f2; color:var(--primary-dark); border:1px solid #d3e2dd}
  #result{display:none; margin-top:20px}
  .brand-line{
    text-align:center; font-size:15px; color:var(--muted); margin-bottom:16px;
  }
  .brand-line strong{color:var(--text); font-size:18px}
  .grid{display:grid; grid-template-columns:1fr 1fr; gap:12px}
  @media (max-width:420px){ .grid{grid-template-columns:1fr} }
  .field{
    border:1px solid var(--line); border-radius:12px; padding:16px 14px; text-align:center;
    background:#fafcfb;
  }
  .field .k{font-size:12.5px; font-weight:600; color:var(--muted); margin-bottom:8px; letter-spacing:.5px}
  .field .v{
    display:inline-block; font-size:16px; font-weight:700; padding:7px 16px; border-radius:999px;
  }
  .field.vuln .v{background:#fdeee8; color:var(--accent)}
  .field.cons .v{background:#e7f0ed; color:var(--primary)}
  .field .v.empty{background:#eef0ef; color:var(--muted); font-weight:500; font-size:14px}
  .section-title{
    font-size:13px; font-weight:700; color:var(--muted); letter-spacing:1px;
    margin:18px 0 10px; display:flex; align-items:center; gap:8px;
  }
  .section-title::after{content:''; flex:1; height:1px; background:var(--line)}
  footer{
    margin-top:auto; padding:20px; font-size:12px; color:var(--muted); text-align:center; line-height:1.6;
  }
</style>
</head>
<body>
<header>
  <div class="badge">SODAM CLASS</div>
  <h1>소담클래스 컨설팅 배정 조회</h1>
  <p>사업자등록번호 10자리를 입력하시면<br>취약분야와 배정된 컨설팅 분야를 확인하실 수 있습니다.</p>
</header>
<main>
  <div class="card">
    <label for="bizno">사업자등록번호</label>
    <div class="input-row">
      <input id="bizno" type="text" inputmode="numeric" autocomplete="off"
             placeholder="000-00-00000" maxlength="12" aria-label="사업자등록번호 입력">
      <button id="searchBtn" type="button">조회</button>
    </div>
    <p class="hint">'-' 없이 숫자만 입력하셔도 됩니다. (예: 1234567890)</p>
    <div id="msg" class="msg" role="alert"></div>
    <div id="result" aria-live="polite">
      <p class="brand-line">브랜드 <strong id="rBrand"></strong> 조회 결과</p>
      <div class="section-title">취약분야</div>
      <div class="grid">
        <div class="field vuln"><div class="k">취약분야 1</div><div class="v" id="rV1"></div></div>
        <div class="field vuln"><div class="k">취약분야 2</div><div class="v" id="rV2"></div></div>
      </div>
      <div class="section-title">배정 컨설팅</div>
      <div class="grid">
        <div class="field cons"><div class="k">배정 컨설팅 1</div><div class="v" id="rC1"></div></div>
        <div class="field cons"><div class="k">배정 컨설팅 2</div><div class="v" id="rC2"></div></div>
      </div>
    </div>
  </div>
</main>
<footer>본 조회 결과는 소담클래스 자가진단 결과를 바탕으로 하며,<br>문의사항은 운영 사무국으로 연락 바랍니다.</footer>

const SALT = 'sodam2026';

const $ = id => document.getElementById(id);
const input = $('bizno'), btn = $('searchBtn'), msg = $('msg'), result = $('result');

// 입력 자동 포맷 (000-00-00000)
input.addEventListener('input', () => {
  const d = input.value.replace(/\D/g,'').slice(0,10);
  input.value = d.length > 5 ? d.slice(0,3)+'-'+d.slice(3,5)+'-'+d.slice(5)
              : d.length > 3 ? d.slice(0,3)+'-'+d.slice(3) : d;
});
input.addEventListener('keydown', e => { if (e.key === 'Enter') search(); });
btn.addEventListener('click', search);

function validBizNo(s){
  if(!/^\d{10}$/.test(s)) return false;
  const w=[1,3,7,1,3,7,1,3,5];
  let t=0;
  for(let i=0;i<9;i++) t += +s[i]*w[i];
  t += Math.floor(+s[8]*5/10);
  return (10 - t%10) % 10 === +s[9];
}

async function sha256hex(str){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}

// 구형 브라우저/파일(file://) 환경 대비: Web Crypto 불가 시 순수 JS 폴백
function sha256hexSync(ascii){
  function rightRotate(value, amount){ return (value>>>amount)|(value<<(32-amount)); }
  var mathPow=Math.pow, maxWord=mathPow(2,32), i, j, result='';
  var words=[], asciiBitLength=ascii.length*8;
  var hash=sha256hexSync.h=sha256hexSync.h||[];
  var k=sha256hexSync.k=sha256hexSync.k||[];
  var primeCounter=k.length, isComposite={};
  for(var candidate=2; primeCounter<64; candidate++){
    if(!isComposite[candidate]){
      for(i=0;i<313;i+=candidate) isComposite[i]=candidate;
      hash[primeCounter]=(mathPow(candidate,.5)*maxWord)|0;
      k[primeCounter++]=(mathPow(candidate,1/3)*maxWord)|0;
    }
  }
  ascii+='\x80';
  while(ascii.length%64-56) ascii+='\x00';
  for(i=0;i<ascii.length;i++){
    j=ascii.charCodeAt(i);
    if(j>>8) return '';
    words[i>>2]|=j<<((3-i)%4)*8;
  }
  words[words.length]=(asciiBitLength/maxWord)|0;
  words[words.length]=asciiBitLength;
  for(j=0;j<words.length;){
    var w=words.slice(j,j+=16), oldHash=hash;
    hash=hash.slice(0,8);
    for(i=0;i<64;i++){
      var w15=w[i-15], w2=w[i-2];
      var a=hash[0], e=hash[4];
      var temp1=hash[7]
        +(rightRotate(e,6)^rightRotate(e,11)^rightRotate(e,25))
        +((e&hash[5])^((~e)&hash[6]))
        +k[i]
        +(w[i]=(i<16)?w[i]:(w[i-16]
          +(rightRotate(w15,7)^rightRotate(w15,18)^(w15>>>3))
          +w[i-7]
          +(rightRotate(w2,17)^rightRotate(w2,19)^(w2>>>10)))|0);
      var temp2=(rightRotate(a,2)^rightRotate(a,13)^rightRotate(a,22))
        +((a&hash[1])^(a&hash[2])^(hash[1]&hash[2]));
      hash=[(temp1+temp2)|0].concat(hash);
      hash[4]=(hash[4]+temp1)|0;
    }
    for(i=0;i<8;i++) hash[i]=(hash[i]+oldHash[i])|0;
  }
  for(i=0;i<8;i++){
    for(j=3;j+1;j--){
      var b=(hash[i]>>(j*8))&255;
      result+=((b<16)?0:'')+b.toString(16);
    }
  }
  return result;
}

async function hashKey(bizno){
  const s = SALT + bizno;
  try{
    if(crypto && crypto.subtle) return (await sha256hex(s)).slice(0,24);
  }catch(e){/* file:// 등에서 subtle 미지원 */}
  return sha256hexSync(s).slice(0,24);
}

function showError(t){ msg.className='msg error'; msg.textContent=t; result.style.display='none'; }
function showInfo(t){ msg.className='msg info'; msg.textContent=t; result.style.display='none'; }

function setVal(id, v){
  const el = $(id);
  if(v && v !== '자가진단 미작성'){ el.textContent = v; el.className='v'; }
  else { el.textContent = '—'; el.className='v empty'; }
}

async function search(){
  const digits = input.value.replace(/\D/g,'');
  msg.className='msg'; msg.textContent='';
  if(digits.length !== 10) return showError('사업자등록번호 10자리를 모두 입력해 주세요.');
  if(!validBizNo(digits)) return showError('유효하지 않은 사업자등록번호입니다. 다시 확인해 주세요.');
  btn.disabled = true; btn.textContent = '조회 중';
  try{
    const key = await hashKey(digits);
    const rec = DATA[key];
    if(!rec){
      showInfo('조회 결과가 없습니다. 소담클래스 참여 업체가 아니거나, 번호를 다시 확인해 주세요.');
      return;
    }
    if(rec.v1 === '자가진단 미작성'){
      showInfo(`${rec.b} — 자가진단 미제출 업체입니다. 자가진단 제출 후 배정 결과를 확인하실 수 있습니다. 운영 사무국으로 문의해 주세요.`);
      return;
    }
    $('rBrand').textContent = rec.b;
    setVal('rV1', rec.v1); setVal('rV2', rec.v2);
    setVal('rC1', rec.c1); setVal('rC2', rec.c2);
    result.style.display = 'block';
  } finally {
    btn.disabled = false; btn.textContent = '조회';
  }
}
</script>
</body>
</html>
